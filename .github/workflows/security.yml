name: Security
on:
  push:
    branches:
    - master
    - user/*/trunk
    paths-ignore:
    - .direnv
    - .helix
    - .meta
    - docs
    - "*.md"
    - .codecov.yml
  pull_request:
    branches:
    - master
    - user/*/trunk
    paths-ignore:
    - .direnv
    - .helix
    - .meta
    - docs
    - "*.md"
    - .codecov.yml
  schedule:
  - cron: '0 9 * * 1'
env:
  DEVSHELL: ci
  GRYPE_DB_CACHE_TEMP_PATH: .cache/grype/db/
permissions:
  actions: read
  contents: read
  security-events: write
jobs:
  sast:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - name: direnv nix
      uses: JRMurr/direnv-nix-action@fc1182ab8fc636cdcef08176ad91e5c1087658d9 # v4.2.0
      with:
        install-nix: true
        cache-store: true
    - name: cache grype
      uses: pat-s/always-upload-cache@9a0d1c3e1a8260b05500f9b67a5be8f2a1299819 # v3
      with:
        path: ${{ runner.temp }}/${{ env.GRYPE_DB_CACHE_TEMP_PATH }}
        key: ${{ runner.os }}-grype-${{ hashFiles('.grype.yaml') }}
        restore-keys: |
          ${{ runner.os }}-grype-${{ hashFiles('.grype.yaml') }}
          ${{ runner.os }}-grype-
    - name: scan
      run: make sast
      timeout-minutes: 5
    - name: report
      uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
      if: always()
      with:
        sarif_file: sast.sarif
